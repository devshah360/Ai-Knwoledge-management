version : '3'

services :

  api :

    build :

    ports:
      - "8000:8000"

    depends_on:
      - redis
      - elastic

  redis:

    image: redis

  elastic:

    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0

    environment:
      - discovery.type=single-node

    ports:
      - "9200:9200"